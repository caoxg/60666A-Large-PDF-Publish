<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>60666A 工程笔记 - Viewer Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.6/viewer.min.css" />
    <style>
        body {
            margin: 0;
            background-color: #2c3e50;
            font-family: sans-serif;
        }

        .header {
            height: 50px;
            background: #1a252f;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        #container {
            width: 100%;
            height: calc(100vh - 50px);
            border: none;
        }

        /* 强制 iframe 内部不留缝隙 */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }
    </style>
</head>

<body>
    <div class="header">
        <span>60666A Team Engineering Notebook</span>
        <small>VEX 2025-2026 Season</small>
    </div>

    <script src="./config.js"></script>
    <div id="container">
        <script>
            document.write('<iframe src="' + window.APP_CONFIG.PDF_URL + '#view=FitH" allowfullscreen></iframe>');
        </script>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.6/viewer.min.js"></script>
    <script>
        // 这里的脚本可以用来处理页面内其他图片的放大预览
        // 但对于 R2 上的 PDF，iframe 配合浏览器的原生内核（PDFium）是解决细线问题的终极方案
    </script>
</body>

</html>
